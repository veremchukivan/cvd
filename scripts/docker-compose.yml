services:
  redis:
    image: redis:7-alpine
    restart: always

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: covid
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5433:5432"

  
  backend:
    build:
      context: ..
      dockerfile: backend/Docker/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    restart: always
    volumes:
      - ../:/app
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:pass@postgres:5432/covid
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:3000
    depends_on:
      - redis
      - postgres
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: backend/Docker/Dockerfile
    command: celery -A covid_project worker -l info
    restart: always
    volumes:
      - ../:/app
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:pass@postgres:5432/covid
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres

  beat:
    build:
      context: ..
      dockerfile: backend/Docker/Dockerfile
    command: celery -A covid_project beat -l info
    restart: always
    volumes:
      - ../:/app
    env_file:
      - ../backend/.env
    environment:
      DATABASE_URL: postgresql://postgres:pass@postgres:5432/covid
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres

  frontend:
    container_name: frontend
    restart: always
    build:
      context: ../frontend
      dockerfile: Docker/Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - ../frontend:/app
    environment:
      # Use host-mapped port so calls from the browser resolve correctly
      - REACT_APP_API_BASE_URL=http://localhost:8000/api/v1
      - WDS_SOCKET_PORT=3000
    depends_on:
      - backend
    user: "0:0"

volumes:
  postgres-data:
