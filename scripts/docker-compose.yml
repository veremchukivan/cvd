services:
  redis:
    image: redis:7-alpine
    restart: always

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_DB: covid
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass
    volumes:
      - postgres-data:/var/lib/postgresql/data

  
  backend:
    build:
      context: ..
      dockerfile: backend/Docker/Dockerfile
    command: python manage.py runserver 0.0.0.0:8000
    restart: always
    volumes:
      - ../:/app
    env_file:
      - ../backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres
    ports:
      - "8000:8000"

  worker:
    build:
      context: ..
      dockerfile: backend/Docker/Dockerfile
    command: celery -A covid_project worker -l info
    restart: always
    volumes:
      - ../:/app
    env_file:
      - ../backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres

  beat:
    build:
      context: ..
      dockerfile: backend/Docker/Dockerfile
    command: celery -A covid_project beat -l info
    restart: always
    volumes:
      - ../:/app
    env_file:
      - ../backend/.env
    environment:
      REDIS_URL: redis://redis:6379/0
    depends_on:
      - redis
      - postgres

volumes:
  postgres-data:
